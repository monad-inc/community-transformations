name: "Promote Avro Nested Values"
description: "Promote nested Avro values to the top level"
author: "Monad"
contributors:
  - "https://github.com/alexs-monad"
inputs:
  - "salesforce-pubsub"
tags:
  - "v1.0.0"
  - "avro"
  - "salesforce"
config:
  operations:
    - operation: "jq"
      arguments:
        key: ""
        query: |
          def flatten_avro:
            if type == "object" then
              if length == 1 then
                to_entries[0].value | flatten_avro
              else
                with_entries(.value |= flatten_avro)
              end
            elif type == "array" then
              map(flatten_avro)
            else
              .
            end;

          flatten_avro